<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#00d4aa">
  <meta name="description" content="Works offline even in deep woods. Convert GPS coordinates to memorable 3-word codes for emergency communication. For hikers, hunters, outdoor safety.">
  <title>ImNotLost - Emergency GPS Location</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="offline-banner">Offline — GPS still works</div>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">📍</div>
        <h1>ImNotLost</h1>
      </div>
      <div class="status-badge">
        <span class="status-dot" id="gps-status-dot"></span>
        <span id="status-text">Ready</span>
      </div>
    </header>

    <!-- Location Code -->
    <div class="geopin-card">
      <div class="geopin-label">Your Location Code</div>
      <div class="geopin-code" id="geopin-code">Waiting for GPS...</div>
      <div class="coordinates" id="coordinates">
        — <button class="coord-format-btn" id="btn-format">DD</button>
      </div>
    </div>

    <!-- Signal & Accuracy -->
    <div class="signal-row">
      <div class="signal-info">
        <div class="signal-bars" id="signal-bars" data-level="0">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
        <span class="accuracy-label">Accuracy</span>
        <span class="accuracy-value" id="accuracy-value">—</span>
      </div>
      <div class="accuracy-bar" id="accuracy-bar">
        <div class="accuracy-fill" id="accuracy-fill"></div>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Altitude</div>
        <div class="stat-value" id="altitude-value">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Speed</div>
        <div class="stat-value" id="speed-value">—</div>
      </div>
      <div class="stat-card compass-card">
        <div class="stat-label">Heading</div>
        <div class="stat-value">
          <span id="heading-value">—</span>
          <span class="compass-arrow" id="compass-arrow">↑</span>
        </div>
      </div>
    </div>

    <!-- Timestamp -->
    <div style="text-align:center; font-size:12px; color:var(--text-dim)">
      Last fix: <span id="timestamp">—</span>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="btn btn-primary" id="btn-track">
        <span class="btn-icon">📡</span> Start GPS
      </button>
      <button class="btn" id="btn-copy">
        <span class="btn-icon">📋</span> Copy
      </button>
      <button class="btn" id="btn-share">
        <span class="btn-icon">📤</span> Share
      </button>
      <button class="btn" id="btn-sms">
        <span class="btn-icon">💬</span> SMS
      </button>
      <button class="btn btn-danger" id="btn-emergency">
        <span class="btn-icon">🚨</span> Emergency Call (112)
      </button>
    </div>

    <!-- Decode Section -->
    <div class="decode-section">
      <div class="decode-title">Decode a Location Code</div>
      <div class="decode-row">
        <input type="text" class="decode-input" id="decode-input"
               placeholder="forest-river-eagle-73" autocomplete="off">
        <button class="decode-btn" id="decode-btn">Decode</button>
      </div>
      <div id="decode-result" class="decode-result"></div>
    </div>

    <div class="footer">ImNotLost — Works offline with GPS satellites</div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
